<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jump & Play!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; }

/* Camera feed as background */
#camera { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 0; }
#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

/* Dark overlay so UI is readable over camera */
.camera-dim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.25); z-index: 1; }

/* UI layer */
.ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.ui > * { pointer-events: auto; }

/* Start screen */
#start-screen { text-align: center; }
#start-screen h1 { font-size: clamp(2.5rem, 8vw, 5rem); color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 0.5em; }
#start-screen p { font-size: clamp(1rem, 3vw, 1.5rem); color: rgba(255,255,255,0.8); margin-bottom: 1.5em; }
.play-btn {
  font-size: clamp(1.8rem, 5vw, 3rem); padding: 0.5em 1.5em;
  border: none; border-radius: 2em; cursor: pointer;
  background: linear-gradient(135deg, #ff6b6b, #ffa500); color: #fff;
  font-weight: 700; box-shadow: 0 8px 30px rgba(255,107,107,0.4);
  animation: pulse 2s ease-in-out infinite; transition: transform 0.2s;
}
.play-btn:active { transform: scale(0.95); }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* Prompt display */
#prompt-area { text-align: center; display: none; }
#prompt-icon { font-size: clamp(5rem, 20vw, 12rem); line-height: 1; margin-bottom: 0.2em; animation: bounceIn 0.5s ease-out; }
#prompt-text {
  font-size: clamp(1.8rem, 6vw, 3.5rem); color: #fff; font-weight: 800;
  text-shadow: 0 4px 20px rgba(0,0,0,0.6); line-height: 1.2;
}
#prompt-sub {
  font-size: clamp(1rem, 3vw, 1.5rem); color: rgba(255,255,255,0.7);
  margin-top: 0.5em;
}
@keyframes bounceIn {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

/* Shape display canvas */
#shape-canvas {
  width: clamp(120px, 35vw, 250px); height: clamp(120px, 35vw, 250px);
  border-radius: 20px; display: none;
  margin: 0 auto 0.5em;
}

/* Celebration */
#celebrate { display: none; text-align: center; }
#celebrate-emoji { font-size: clamp(5rem, 18vw, 10rem); animation: celebrateBounce 0.6s ease-out; }
#celebrate-text { font-size: clamp(1.5rem, 5vw, 3rem); color: #fff; font-weight: 800; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
@keyframes celebrateBounce {
  0% { transform: scale(0) rotate(-20deg); } 50% { transform: scale(1.3) rotate(10deg); } 100% { transform: scale(1) rotate(0); }
}

/* Encouragement */
#encourage { display: none; text-align: center; }
#encourage-text { font-size: clamp(1.3rem, 4vw, 2.5rem); color: #ffe66d; font-weight: 700; text-shadow: 0 3px 15px rgba(0,0,0,0.5); }

/* Star counter */
#stars {
  position: fixed; top: 1em; right: 1em; z-index: 20;
  font-size: clamp(1.2rem, 3.5vw, 2rem); color: #ffe66d;
  font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  display: none;
}

/* Round counter */
#round-info {
  position: fixed; top: 1em; left: 1em; z-index: 20;
  font-size: clamp(0.9rem, 2.5vw, 1.3rem); color: rgba(255,255,255,0.6);
  display: none;
}

/* Parent controls */
#controls {
  position: fixed; bottom: 1em; right: 1em; z-index: 20;
  display: flex; gap: 0.5em;
}
.ctrl-btn {
  width: clamp(40px, 10vw, 56px); height: clamp(40px, 10vw, 56px);
  border: none; border-radius: 50%; cursor: pointer;
  background: rgba(255,255,255,0.15); color: #fff;
  font-size: clamp(1rem, 3vw, 1.5rem); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:active { background: rgba(255,255,255,0.3); }

/* Loading */
#loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #1a1a2e; z-index: 100; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-size: 1.3rem;
}
#loading .spinner {
  width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #ff6b6b; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 1em;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-status { color: rgba(255,255,255,0.6); margin-top: 0.5em; font-size: 0.9rem; }

/* Confetti canvas */
#confetti {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 15; pointer-events: none;
}

/* Detection feedback dot */
#detection-dot {
  position: fixed; bottom: 1em; left: 1em; z-index: 20;
  width: 12px; height: 12px; border-radius: 50%;
  background: #555; transition: background 0.3s;
}
#detection-dot.active { background: #4ecdc4; }
</style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>
<div class="camera-dim"></div>
<canvas id="confetti"></canvas>
<canvas id="overlay"></canvas>

<div id="loading">
  <div class="spinner"></div>
  Loading game...
  <div id="load-status"></div>
</div>

<div class="ui">
  <div id="start-screen">
    <h1>Jump & Play!</h1>
    <p>A game for little ones</p>
    <button class="play-btn" id="play-btn">Play!</button>
  </div>
  <div id="prompt-area">
    <canvas id="shape-canvas"></canvas>
    <div id="prompt-icon"></div>
    <div id="prompt-text"></div>
    <div id="prompt-sub"></div>
  </div>
  <div id="celebrate">
    <div id="celebrate-emoji"></div>
    <div id="celebrate-text"></div>
  </div>
  <div id="encourage">
    <div id="encourage-text"></div>
  </div>
</div>

<div id="stars"></div>
<div id="round-info"></div>
<div id="detection-dot"></div>

<div id="controls">
  <button class="ctrl-btn" id="skip-btn" title="Next" style="display:none; font-size:clamp(1.2rem,3.5vw,1.8rem)">&#9197;</button>
  <button class="ctrl-btn" id="mute-btn" title="Mute">&#128266;</button>
  <button class="ctrl-btn" id="restart-btn" title="Restart">&#8634;</button>
</div>

<script type="module">
// ─── MediaPipe Imports ───────────────────────────────────
import { FaceLandmarker, HandLandmarker, PoseLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs';

// ─── DOM refs ────────────────────────────────────────────
const $ = id => document.getElementById(id);
const video = $('camera');
const confettiCanvas = $('confetti');
const confettiCtx = confettiCanvas.getContext('2d');
const shapeCanvas = $('shape-canvas');
const shapeCtx = shapeCanvas.getContext('2d');

// ─── State ───────────────────────────────────────────────
let state = 'loading'; // loading | start | prompting | detecting | celebrating | encouraging
let round = 0;
let stars = 0;
let muted = false;
let currentPrompt = null;
let detectStart = 0;
let encourageShown = false;
let faceLandmarker, handLandmarker, poseLandmarker;
let lastFrameTime = 0;
let recognition = null; // SpeechRecognition instance
let animFrame = null;
let micAnalyser = null; // Web Audio analyser for volume
let micData = null; // Uint8Array for analyser

// ─── Audio ───────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration, type = 'sine') {
  if (muted) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function playSuccess() {
  playTone(523, 0.15); // C
  setTimeout(() => playTone(659, 0.15), 100); // E
  setTimeout(() => playTone(784, 0.3), 200); // G
}

function playEncourage() {
  playTone(440, 0.2, 'triangle');
}

// ─── Speech ──────────────────────────────────────────────
function speak(text) {
  if (muted) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85;
  u.pitch = 1.3;
  u.volume = 1;
  speechSynthesis.speak(u);
}

function startListening(expectedWords, onMatch) {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    // No speech recognition -- auto-pass after delay
    setTimeout(onMatch, 4000);
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript.toLowerCase().trim();
      for (const word of expectedWords) {
        if (transcript.includes(word.toLowerCase())) {
          stopListening();
          onMatch();
          return;
        }
      }
    }
  };
  recognition.onerror = () => {};
  recognition.onend = () => {
    // Restart if we're still detecting
    if (state === 'detecting' && recognition) {
      try { recognition.start(); } catch(e) {}
    }
  };
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
}

// ─── Confetti ────────────────────────────────────────────
let confettiPieces = [];
const COLORS = ['#ff6b6b','#ffa500','#ffe66d','#4ecdc4','#a78bfa','#ff8ed4','#6bcb77'];

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}

function spawnConfetti() {
  confettiPieces = [];
  for (let i = 0; i < 80; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * 200,
      w: 8 + Math.random() * 8,
      h: 4 + Math.random() * 6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.3
    });
  }
}

function drawConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  let alive = false;
  for (const p of confettiPieces) {
    if (p.y > confettiCanvas.height + 20) continue;
    alive = true;
    p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.vy += 0.1;
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    confettiCtx.restore();
  }
  if (alive) requestAnimationFrame(drawConfetti);
}

// ─── Shape Drawing ───────────────────────────────────────
const SHAPES = {
  circle:   { name: 'circle',   words: ['circle', 'round', 'ball'], color: '#ff6b6b' },
  star:     { name: 'star',     words: ['star'],                    color: '#ffe66d' },
  heart:    { name: 'heart',    words: ['heart', 'love'],           color: '#ff8ed4' },
  triangle: { name: 'triangle', words: ['triangle'],                color: '#4ecdc4' },
  square:   { name: 'square',   words: ['square', 'box'],           color: '#a78bfa' },
};

const SHAPE_COLORS = {
  red:    '#ff6b6b',
  blue:   '#4e9af1',
  green:  '#6bcb77',
  yellow: '#ffe66d',
  purple: '#a78bfa',
  orange: '#ffa500',
  pink:   '#ff8ed4',
};

function drawShape(shapeName, color) {
  const s = shapeCanvas.width;
  shapeCanvas.style.display = 'block';
  shapeCtx.clearRect(0, 0, s, s);
  shapeCtx.fillStyle = color;
  shapeCtx.strokeStyle = '#fff';
  shapeCtx.lineWidth = 4;
  const cx = s/2, cy = s/2, r = s * 0.38;

  switch (shapeName) {
    case 'circle':
      shapeCtx.beginPath(); shapeCtx.arc(cx, cy, r, 0, Math.PI*2);
      shapeCtx.fill(); shapeCtx.stroke(); break;
    case 'square':
      shapeCtx.beginPath(); shapeCtx.rect(cx-r, cy-r, r*2, r*2);
      shapeCtx.fill(); shapeCtx.stroke(); break;
    case 'triangle':
      shapeCtx.beginPath();
      shapeCtx.moveTo(cx, cy - r);
      shapeCtx.lineTo(cx + r, cy + r*0.8);
      shapeCtx.lineTo(cx - r, cy + r*0.8);
      shapeCtx.closePath(); shapeCtx.fill(); shapeCtx.stroke(); break;
    case 'star': {
      shapeCtx.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI / 5) - Math.PI/2;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        i === 0 ? shapeCtx.moveTo(x, y) : shapeCtx.lineTo(x, y);
      }
      shapeCtx.closePath(); shapeCtx.fill(); shapeCtx.stroke(); break;
    }
    case 'heart': {
      shapeCtx.beginPath();
      const top = cy - r * 0.4;
      shapeCtx.moveTo(cx, cy + r * 0.7);
      shapeCtx.bezierCurveTo(cx - r*1.2, cy - r*0.2, cx - r*0.7, top - r*0.5, cx, top + r*0.3);
      shapeCtx.bezierCurveTo(cx + r*0.7, top - r*0.5, cx + r*1.2, cy - r*0.2, cx, cy + r*0.7);
      shapeCtx.fill(); shapeCtx.stroke(); break;
    }
  }
}

// ─── Prompt Definitions ──────────────────────────────────
function getPromptsForLevel(level) {
  const prompts = [];

  // Level 1: face-based (smile, open mouth, close eyes) + jump
  prompts.push(
    { type: 'smile',     icon: '😊', text: 'Show me a BIG SMILE!',       voice: 'Show me a big smile!',        sub: '' },
    { type: 'jump',      icon: '🦘', text: 'Can you JUMP?',              voice: 'Can you jump?',               sub: '' },
    { type: 'openmouth', icon: '😮', text: 'Open your mouth WIDE!',      voice: 'Open your mouth really wide!', sub: '' },
    { type: 'closeeyes', icon: '😴', text: 'Close your EYES!',           voice: 'Close your eyes!',            sub: '' },
  );

  if (level >= 2) {
    // Add fingers 1-3, wave, be loud
    for (let n = 1; n <= 3; n++) {
      const fingerWord = n === 1 ? 'finger' : 'fingers';
      prompts.push({
        type: 'fingers', count: n,
        icon: ['','☝️','✌️','🤟'][n],
        text: `Hold up ${n} ${fingerWord}!`,
        voice: `Hold up ${n} ${fingerWord}!`,
        sub: '',
      });
    }
    prompts.push(
      { type: 'wave',  icon: '👋', text: 'WAVE hello!',     voice: 'Wave hello!',                sub: '' },
      { type: 'loud',  icon: '📢', text: 'Be really LOUD!', voice: 'Make some noise! Be loud!',  sub: 'Shout, scream, or sing!' },
    );
  }

  if (level >= 3) {
    // Shapes, blow, dance
    const shapeKeys = Object.keys(SHAPES);
    for (const k of shapeKeys) {
      prompts.push({
        type: 'shape', shape: k,
        icon: '', text: 'What shape is this?',
        voice: 'What shape is this?',
        sub: `Say "${SHAPES[k].name}"`,
      });
    }
    prompts.push(
      { type: 'blow',  icon: '🌬️', text: 'BLOW like the wind!', voice: 'Blow like the wind!',      sub: 'Make an O with your mouth!' },
      { type: 'dance', icon: '💃', text: 'DANCE! Wiggle around!', voice: 'Dance! Wiggle around!',   sub: '' },
      { type: 'sing',  icon: '🎤', text: 'SING a song!',         voice: 'Sing me a song! La la la!', sub: 'Make some sounds!' },
    );
  }

  if (level >= 4) {
    // Fingers 4-5
    for (let n = 4; n <= 5; n++) {
      prompts.push({
        type: 'fingers', count: n,
        icon: n === 4 ? '🖖' : '🖐️',
        text: `Hold up ${n} fingers!`,
        voice: `Hold up ${n} fingers!`,
        sub: '',
      });
    }
  }
  return prompts;
}

function getLevel() {
  if (round < 3) return 1;
  if (round < 6) return 2;
  if (round < 9) return 3;
  return 4;
}

function pickPrompt() {
  const level = getLevel();
  const prompts = getPromptsForLevel(level);
  return prompts[Math.floor(Math.random() * prompts.length)];
}

// ─── Detection Logic ─────────────────────────────────────
// Per-person pose histories keyed by person index
let poseHistories = {}; // { personIdx: { samples: [y,...], baseline: number|null } }

function resetJumpState() {
  poseHistories = {};
}

function detectSmile(faceLandmarks) {
  if (!faceLandmarks || faceLandmarks.length === 0) return false;
  // Check ALL detected faces -- any smile counts
  for (const lm of faceLandmarks) {
    const mouthWidth = Math.abs(lm[291].x - lm[61].x);
    const mouthHeight = Math.abs(lm[14].y - lm[13].y);
    const faceWidth = Math.abs(lm[454].x - lm[234].x);
    if (faceWidth < 0.01) continue;
    const ratio = mouthWidth / faceWidth;
    if (ratio > 0.36 && mouthHeight > 0.008) return true;
  }
  return false;
}

function detectJumpForPerson(landmarks, idx) {
  // Average nose (0) and both shoulders (11,12) for stability
  const noseY = landmarks[0].y;
  const lShoulderY = landmarks[11] ? landmarks[11].y : noseY;
  const rShoulderY = landmarks[12] ? landmarks[12].y : noseY;
  const y = (noseY + lShoulderY + rShoulderY) / 3;

  if (!poseHistories[idx]) poseHistories[idx] = { samples: [], baseline: null };
  const ph = poseHistories[idx];
  ph.samples.push(y);
  if (ph.samples.length > 45) ph.samples.shift();
  if (ph.samples.length < 6) return false;

  // Rolling baseline: average of the middle 60% of recent samples (excludes extremes)
  const sorted = [...ph.samples].sort((a,b) => a - b);
  const lo = Math.floor(sorted.length * 0.2);
  const hi = Math.ceil(sorted.length * 0.8);
  ph.baseline = sorted.slice(lo, hi).reduce((a,b) => a+b, 0) / (hi - lo);

  // Detect upward movement: recent minimum vs baseline
  const recentMin = Math.min(...ph.samples.slice(-10));
  const delta = ph.baseline - recentMin;

  // Also check velocity: rapid upward change between consecutive frames
  const len = ph.samples.length;
  let maxVelocity = 0;
  for (let i = Math.max(1, len - 6); i < len; i++) {
    const v = ph.samples[i-1] - ph.samples[i]; // positive = upward
    if (v > maxVelocity) maxVelocity = v;
  }

  // Threshold: 1.5% of frame height OR fast upward velocity
  const jumped = delta > 0.015 || maxVelocity > 0.012;
  if (jumped) {
    ph.samples = [];
    ph.baseline = null;
  }
  return jumped;
}

function detectJump(poseLandmarks) {
  if (!poseLandmarks || poseLandmarks.length === 0) return false;
  // Check ALL detected poses -- any jump counts
  for (let i = 0; i < poseLandmarks.length; i++) {
    if (detectJumpForPerson(poseLandmarks[i], i)) return true;
  }
  return false;
}

function countFingers(handLandmarks) {
  if (!handLandmarks || handLandmarks.length === 0) return 0;
  let total = 0;
  for (const hand of handLandmarks) {
    let fingers = 0;
    const thumbTip = hand[4];
    const thumbIp = hand[3];
    const wrist = hand[0];
    const indexMcp = hand[5];
    const isRight = indexMcp.x < wrist.x;
    if (isRight ? (thumbTip.x < thumbIp.x) : (thumbTip.x > thumbIp.x)) fingers++;

    const tips = [8, 12, 16, 20];
    const pips = [6, 10, 14, 18];
    for (let i = 0; i < 4; i++) {
      if (hand[tips[i]].y < hand[pips[i]].y) fingers++;
    }
    total += fingers;
  }
  return total;
}

function getMicVolume() {
  if (!micAnalyser || !micData) return 0;
  micAnalyser.getByteTimeDomainData(micData);
  let sum = 0;
  for (let i = 0; i < micData.length; i++) {
    const v = (micData[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / micData.length); // RMS 0..1
}

function detectOpenMouth(faceLandmarks) {
  if (!faceLandmarks || faceLandmarks.length === 0) return false;
  for (const lm of faceLandmarks) {
    const upperLip = lm[13].y;
    const lowerLip = lm[14].y;
    const faceHeight = Math.abs(lm[10].y - lm[152].y); // forehead to chin
    if (faceHeight < 0.01) continue;
    const openness = (lowerLip - upperLip) / faceHeight;
    if (openness > 0.15) return true;
  }
  return false;
}

function detectCloseEyes(faceLandmarks) {
  if (!faceLandmarks || faceLandmarks.length === 0) return false;
  for (const lm of faceLandmarks) {
    // Left eye: top 159, bottom 145. Right eye: top 386, bottom 374.
    const leftOpen = Math.abs(lm[159].y - lm[145].y);
    const rightOpen = Math.abs(lm[386].y - lm[374].y);
    const faceHeight = Math.abs(lm[10].y - lm[152].y);
    if (faceHeight < 0.01) continue;
    const leftRatio = leftOpen / faceHeight;
    const rightRatio = rightOpen / faceHeight;
    if (leftRatio < 0.018 && rightRatio < 0.018) return true;
  }
  return false;
}

function detectBlow(faceLandmarks) {
  if (!faceLandmarks || faceLandmarks.length === 0) return false;
  for (const lm of faceLandmarks) {
    // Pursed lips: mouth narrow width + slightly open
    const mouthWidth = Math.abs(lm[291].x - lm[61].x);
    const mouthOpen = Math.abs(lm[14].y - lm[13].y);
    const faceWidth = Math.abs(lm[454].x - lm[234].x);
    if (faceWidth < 0.01) continue;
    const widthRatio = mouthWidth / faceWidth;
    const faceHeight = Math.abs(lm[10].y - lm[152].y);
    const openRatio = mouthOpen / faceHeight;
    // Pursed: narrow but open (like an "O")
    if (widthRatio < 0.28 && openRatio > 0.04) return true;
  }
  return false;
}

let waveHistory = []; // track hand x positions
function detectWave(handLandmarks) {
  if (!handLandmarks || handLandmarks.length === 0) { waveHistory = []; return false; }
  const x = handLandmarks[0][0].x; // wrist x of first hand
  waveHistory.push(x);
  if (waveHistory.length > 30) waveHistory.shift();
  if (waveHistory.length < 12) return false;
  // Count direction changes (zigzag = wave)
  let changes = 0;
  for (let i = 2; i < waveHistory.length; i++) {
    const d1 = waveHistory[i-1] - waveHistory[i-2];
    const d2 = waveHistory[i] - waveHistory[i-1];
    if (d1 * d2 < 0 && Math.abs(d2) > 0.005) changes++;
  }
  if (changes >= 3) { waveHistory = []; return true; }
  return false;
}

let danceHistory = []; // track overall body movement
function detectDance(poseLandmarks) {
  if (!poseLandmarks || poseLandmarks.length === 0) return false;
  // Sum movement of multiple joints across all people
  let movement = 0;
  for (const lm of poseLandmarks) {
    const points = [0, 11, 12, 15, 16]; // nose, shoulders, wrists
    const snapshot = points.map(i => ({ x: lm[i].x, y: lm[i].y }));
    danceHistory.push(snapshot);
  }
  if (danceHistory.length > 30) danceHistory.splice(0, danceHistory.length - 30);
  if (danceHistory.length < 10) return false;
  // Measure total movement in recent frames
  for (let i = 1; i < danceHistory.length; i++) {
    for (let j = 0; j < danceHistory[i].length; j++) {
      if (danceHistory[i-1][j]) {
        const dx = danceHistory[i][j].x - danceHistory[i-1][j].x;
        const dy = danceHistory[i][j].y - danceHistory[i-1][j].y;
        movement += Math.sqrt(dx*dx + dy*dy);
      }
    }
  }
  if (movement > 0.8) { danceHistory = []; return true; }
  return false;
}

// ─── Game Flow ───────────────────────────────────────────
function showScreen(id) {
  for (const s of ['start-screen','prompt-area','celebrate','encourage']) {
    $(s).style.display = s === id ? 'flex' : 'none';
    if (s === id) $(s).style.display = 'block';
  }
}

function startGame() {
  round = 0; stars = 0;
  $('stars').style.display = 'block';
  $('round-info').style.display = 'block';
  updateUI();
  nextRound();
}

function updateUI() {
  $('stars').textContent = '⭐'.repeat(Math.min(stars, 20)) + (stars > 0 ? ` ${stars}` : '');
  $('round-info').textContent = `Round ${round + 1}`;
}

function nextRound() {
  currentPrompt = pickPrompt();
  encourageShown = false;
  resetJumpState();
  waveHistory = [];
  danceHistory = [];
  updateUI();

  // Show prompt
  state = 'prompting';
  showScreen('prompt-area');

  // Shape display
  if (currentPrompt.type === 'shape') {
    const s = SHAPES[currentPrompt.shape];
    const size = Math.min(window.innerWidth * 0.35, 250);
    shapeCanvas.width = size; shapeCanvas.height = size;
    drawShape(currentPrompt.shape, s.color);
    $('prompt-icon').textContent = '';
    $('prompt-icon').style.display = 'none';
    shapeCanvas.style.display = 'block';
  } else {
    shapeCanvas.style.display = 'none';
    $('prompt-icon').style.display = 'block';
    $('prompt-icon').textContent = currentPrompt.icon;
  }

  $('prompt-text').textContent = currentPrompt.text;
  $('prompt-sub').textContent = currentPrompt.sub;

  // Voice prompt
  speak(currentPrompt.voice);

  // Show skip button
  $('skip-btn').style.display = 'flex';

  // Start detecting after a brief pause
  setTimeout(() => {
    state = 'detecting';
    detectStart = Date.now();

    // If shape prompt, start speech recognition
    if (currentPrompt.type === 'shape') {
      const shape = SHAPES[currentPrompt.shape];
      startListening(shape.words, () => triggerSuccess());
    }
  }, 800);
}

function triggerSuccess() {
  if (state !== 'detecting') return;
  state = 'celebrating';
  stopListening();
  stars++;
  updateUI();
  $('skip-btn').style.display = 'none';

  showScreen('celebrate');
  const celebrations = ['🎉','🌟','🎊','💫','🥳','👏'];
  $('celebrate-emoji').textContent = celebrations[Math.floor(Math.random() * celebrations.length)];
  const praises = ['Amazing!','Wow!','You did it!','Yay!','Super!','Fantastic!','Great job!'];
  const praise = praises[Math.floor(Math.random() * praises.length)];
  $('celebrate-text').textContent = praise;

  // Re-trigger animation
  $('celebrate-emoji').style.animation = 'none';
  $('celebrate-emoji').offsetHeight; // reflow
  $('celebrate-emoji').style.animation = 'celebrateBounce 0.6s ease-out';

  playSuccess();
  speak(praise);
  spawnConfetti();
  drawConfetti();

  setTimeout(() => {
    round++;
    nextRound();
  }, 2500);
}

function showEncouragement() {
  if (encourageShown || state !== 'detecting') return;
  encourageShown = true;

  // Briefly show encouragement overlay
  $('encourage').style.display = 'block';
  const phrases = ['You can do it!', 'Try again!', 'Almost!', 'Keep going!'];
  $('encourage-text').textContent = phrases[Math.floor(Math.random() * phrases.length)];
  playEncourage();
  speak($('encourage-text').textContent);

  setTimeout(() => { $('encourage').style.display = 'none'; }, 2000);
}

function autoAdvance() {
  if (state !== 'detecting') return;
  state = 'celebrating';
  stopListening();
  $('skip-btn').style.display = 'none';

  showScreen('celebrate');
  $('celebrate-emoji').textContent = '💪';
  $('celebrate-text').textContent = 'Great try!';
  $('celebrate-emoji').style.animation = 'none';
  $('celebrate-emoji').offsetHeight;
  $('celebrate-emoji').style.animation = 'celebrateBounce 0.6s ease-out';

  speak('Great try! Let\'s do another one!');
  playEncourage();

  setTimeout(() => {
    round++;
    nextRound();
  }, 2500);
}

// ─── Detection Loop ──────────────────────────────────────
async function detectionLoop() {
  if (state === 'detecting' && currentPrompt) {
    const elapsed = Date.now() - detectStart;

    // Encouragement at 8s
    if (elapsed > 8000 && !encourageShown) showEncouragement();
    // Auto-advance at 15s
    if (elapsed > 15000) { autoAdvance(); return; }

    const now = performance.now();
    let detected = false;

    try {
      if (currentPrompt.type === 'smile' && faceLandmarker) {
        const result = faceLandmarker.detectForVideo(video, now);
        if (result.faceLandmarks && detectSmile(result.faceLandmarks)) detected = true;
      }
      else if (currentPrompt.type === 'openmouth' && faceLandmarker) {
        const result = faceLandmarker.detectForVideo(video, now);
        if (result.faceLandmarks && detectOpenMouth(result.faceLandmarks)) detected = true;
      }
      else if (currentPrompt.type === 'closeeyes' && faceLandmarker) {
        const result = faceLandmarker.detectForVideo(video, now);
        if (result.faceLandmarks && detectCloseEyes(result.faceLandmarks)) detected = true;
      }
      else if (currentPrompt.type === 'blow' && faceLandmarker) {
        const result = faceLandmarker.detectForVideo(video, now);
        if (result.faceLandmarks && detectBlow(result.faceLandmarks)) detected = true;
      }
      else if (currentPrompt.type === 'jump' && poseLandmarker) {
        const result = poseLandmarker.detectForVideo(video, now);
        if (result.landmarks && detectJump(result.landmarks)) detected = true;
      }
      else if (currentPrompt.type === 'dance' && poseLandmarker) {
        const result = poseLandmarker.detectForVideo(video, now);
        if (result.landmarks && detectDance(result.landmarks)) detected = true;
      }
      else if (currentPrompt.type === 'fingers' && handLandmarker) {
        const result = handLandmarker.detectForVideo(video, now);
        const count = countFingers(result.landmarks);
        $('detection-dot').title = `Fingers: ${count}`;
        if (count === currentPrompt.count) detected = true;
      }
      else if (currentPrompt.type === 'wave' && handLandmarker) {
        const result = handLandmarker.detectForVideo(video, now);
        if (result.landmarks && detectWave(result.landmarks)) detected = true;
      }
      else if (currentPrompt.type === 'loud' || currentPrompt.type === 'sing') {
        const vol = getMicVolume();
        $('detection-dot').title = `Vol: ${vol.toFixed(3)}`;
        const threshold = currentPrompt.type === 'loud' ? 0.15 : 0.08;
        if (vol > threshold) detected = true;
      }
      // Shape detection handled by speech recognition, no vision needed
    } catch(e) {}

    // Update detection indicator
    $('detection-dot').classList.toggle('active', detected);

    if (detected) {
      triggerSuccess();
      return;
    }
  }

  animFrame = requestAnimationFrame(detectionLoop);
}

// ─── Init ────────────────────────────────────────────────
async function init() {
  resizeConfetti();
  window.addEventListener('resize', resizeConfetti);

  $('load-status').textContent = 'Requesting camera...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(e) {
    $('load-status').textContent = 'Camera needed to play! Please allow camera access and reload.';
    return;
  }

  $('load-status').textContent = 'Setting up microphone...';
  try {
    const micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const micSource = audioCtx.createMediaStreamSource(micStream);
    micAnalyser = audioCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    micAnalyser.smoothingTimeConstant = 0.3;
    micSource.connect(micAnalyser);
    micData = new Uint8Array(micAnalyser.frequencyBinCount);
  } catch(e) {
    // Mic not available -- volume-based prompts will auto-pass
  }

  $('load-status').textContent = 'Loading face detection...';
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
  );

  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task', delegate: 'GPU' },
    runningMode: 'VIDEO', numFaces: 4, outputFaceBlendshapes: false,
  });

  $('load-status').textContent = 'Loading hand detection...';
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate: 'GPU' },
    runningMode: 'VIDEO', numHands: 4,
  });

  $('load-status').textContent = 'Loading pose detection...';
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task', delegate: 'GPU' },
    runningMode: 'VIDEO', numPoses: 4,
  });

  $('load-status').textContent = 'Ready!';
  $('loading').style.display = 'none';
  state = 'start';

  // Start detection loop (runs continuously, game state controls what it does)
  detectionLoop();
}

// ─── Event Handlers ──────────────────────────────────────
$('play-btn').addEventListener('click', () => {
  audioCtx.resume();
  showScreen(null);
  $('start-screen').style.display = 'none';
  startGame();
});

$('mute-btn').addEventListener('click', () => {
  muted = !muted;
  $('mute-btn').innerHTML = muted ? '&#128263;' : '&#128266;';
  if (muted) speechSynthesis.cancel();
});

$('restart-btn').addEventListener('click', () => {
  stopListening();
  state = 'start';
  resetJumpState();
  waveHistory = [];
  danceHistory = [];
  $('skip-btn').style.display = 'none';
  showScreen('start-screen');
  $('stars').style.display = 'none';
  $('round-info').style.display = 'none';
  confettiPieces = [];
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
});

$('skip-btn').addEventListener('click', () => {
  if (state === 'detecting' || state === 'prompting') {
    stopListening();
    $('skip-btn').style.display = 'none';
    state = 'celebrating';
    round++;
    // Quick transition, no fanfare
    setTimeout(() => nextRound(), 300);
  }
});

// Go!
init();
</script>
